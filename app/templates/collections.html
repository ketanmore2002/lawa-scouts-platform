{% extends base_template|default("base.html") %}
{% block title %}Collections{% endblock %}

{% block content %}
<div x-data="collectionsPage()" x-init="init()">

    <template x-if="loading">
        <div style="text-align:center;padding:64px 0;">
            <div class="spinner"></div>
            <p class="text-muted mt-12" style="font-size:14px;">Loading collections...</p>
        </div>
    </template>

    <template x-if="!loading">
        <div>
            <div class="flex items-center justify-between flex-wrap gap-16 mb-24">
                <div>
                    <p class="eyebrow">Library</p>
                    <h1 class="page-title">Collections</h1>
                </div>
                <button @click="showCreate = true" class="btn-primary btn-sm">+ New Collection</button>
            </div>

            <template x-if="collections.length === 0">
                <div class="card empty-state">
                    <div class="empty-icon">
                        <svg width="28" height="28" fill="none" stroke="var(--deep-teal)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                    </div>
                    <h3 class="text-primary mb-8" style="font-size:18px;font-weight:600;">No collections yet</h3>
                    <p class="text-secondary mb-24" style="font-size:14px;">Pin report findings into themed boards for easy reference.</p>
                    <button @click="showCreate = true" class="btn-primary btn-sm">Create Collection</button>
                </div>
            </template>

            <div class="scouts-grid">
                <template x-for="c in collections" :key="c.id">
                    <div class="card card-body card-interactive" @click="navigateTo('/collections/' + c.id)">
                        <div class="flex items-start justify-between mb-8">
                            <h3 class="text-primary text-truncate flex-1 mr-12" style="font-size:16px;font-weight:600;" x-text="c.name"></h3>
                            <span class="r-badge" :class="c.workspace_id ? 'r-badge-purple' : 'r-badge-default'"
                                  x-text="c.workspace_id ? 'Workspace' : 'Personal'"></span>
                        </div>
                        <p class="text-secondary line-clamp-2 mb-12" style="font-size:14px;" x-text="c.description || 'No description'"></p>
                        <div class="flex items-center gap-8 text-xs text-muted">
                            <span x-text="(c.item_count || 0) + ' item' + ((c.item_count || 0) !== 1 ? 's' : '')"></span>
                            <span>&middot;</span>
                            <span x-text="formatTime(c.created_at)"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- Create Modal -->
    <template x-if="showCreate">
        <div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;"
             @click.self="showCreate=false" @keydown.escape.window="showCreate=false">
            <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;">
                <h3 class="text-primary mb-16" style="font-size:18px;font-weight:600;">New Collection</h3>
                <div class="mb-12">
                    <label class="text-muted" style="font-size:12px;font-weight:500;display:block;margin-bottom:4px;">Name</label>
                    <input x-model="newName" type="text" class="input" placeholder="e.g. Key Market Insights" @keydown.enter="createCollection()" autofocus />
                </div>
                <div class="mb-12">
                    <label class="text-muted" style="font-size:12px;font-weight:500;display:block;margin-bottom:4px;">Description (optional)</label>
                    <textarea x-model="newDesc" class="input" rows="2" placeholder="What is this collection about?"></textarea>
                </div>
                <div class="mb-16">
                    <label class="text-muted" style="font-size:12px;font-weight:500;display:block;margin-bottom:4px;">Workspace (optional)</label>
                    <select x-model="newWorkspaceId" class="input" style="height:42px;">
                        <option value="">Personal</option>
                        <template x-for="ws in workspaces" :key="ws.id">
                            <option :value="ws.id" x-text="ws.name"></option>
                        </template>
                    </select>
                </div>
                <div class="flex items-center justify-end gap-10">
                    <button @click="showCreate=false" class="btn-secondary btn-sm">Cancel</button>
                    <button @click="createCollection()" :disabled="!newName.trim()" class="btn-primary btn-sm">Create</button>
                </div>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<script>
function collectionsPage() {
    return {
        collections: [],
        workspaces: [],
        loading: true,
        showCreate: false,
        newName: '',
        newDesc: '',
        newWorkspaceId: '',

        async init() {
            try {
                const [cols, wsList] = await Promise.all([
                    apiCall('/api/collections'),
                    apiCall('/api/workspaces'),
                ]);
                this.collections = cols;
                this.workspaces = wsList;
            } catch (e) {
                showToast(e.message, 'error');
            }
            this.loading = false;
        },

        async createCollection() {
            const name = this.newName.trim();
            if (!name) return;
            try {
                const col = await apiCall('/api/collections', 'POST', {
                    name,
                    description: this.newDesc.trim() || null,
                    workspace_id: this.newWorkspaceId || null,
                });
                this.collections.unshift(col);
                this.showCreate = false;
                this.newName = '';
                this.newDesc = '';
                this.newWorkspaceId = '';
                showToast('Collection created');
            } catch (e) {
                showToast(e.message, 'error');
            }
        },

        formatTime(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString();
        },
    }
}
</script>
{% endblock %}
