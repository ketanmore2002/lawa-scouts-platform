{% extends base_template|default("base.html") %}
{% block title %}Workspace{% endblock %}

{% block content %}
<div x-data="workspacePage('{{ workspace_id }}')" x-init="init()">

    <!-- Loading -->
    <template x-if="loading">
        <div style="text-align:center;padding:64px 0;">
            <div class="spinner"></div>
            <p class="text-muted mt-12" style="font-size:14px;">Loading workspace...</p>
        </div>
    </template>

    <template x-if="!loading && workspace">
        <div>
            <!-- Back -->
            <a href="/" class="back-link">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Back to Dashboard
            </a>

            <!-- Header -->
            <div class="flex items-center justify-between flex-wrap gap-16 mb-24">
                <div>
                    <p class="eyebrow">Workspace</p>
                    <h1 class="page-title" x-text="workspace.name"></h1>
                </div>
                <div class="flex items-center gap-10">
                    <template x-if="isOwner">
                        <button @click="showRenameModal = true" class="btn-secondary btn-sm">Rename</button>
                    </template>
                    <template x-if="isOwner">
                        <button @click="deleteWorkspace()" class="btn-danger btn-sm">Delete</button>
                    </template>
                </div>
            </div>

            <!-- Tab Bar -->
            <div class="tab-bar mb-24">
                <div class="tab-bar-left">
                    <button class="tab-btn" :class="{'tab-btn-active': tab === 'scouts'}" @click="tab = 'scouts'">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Scouts
                        <span class="tab-count" x-show="scouts.length > 0" x-text="scouts.length"></span>
                    </button>
                    <button class="tab-btn" :class="{'tab-btn-active': tab === 'members'}" @click="tab = 'members'">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        Members
                        <span class="tab-count" x-show="members.length > 0" x-text="members.length"></span>
                    </button>
                    <button class="tab-btn" :class="{'tab-btn-active': tab === 'activity'}" @click="tab = 'activity'; loadActivity()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        Activity
                    </button>
                </div>
            </div>

            <!-- ═══ SCOUTS TAB ═══ -->
            <div x-show="tab === 'scouts'" x-cloak>
                <template x-if="scouts.length === 0">
                    <div class="card empty-state">
                        <div class="empty-icon">
                            <svg width="28" height="28" fill="none" stroke="var(--deep-teal)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        </div>
                        <h3 class="text-primary mb-8" style="font-size:18px;font-weight:600;">No workspace scouts yet</h3>
                        <p class="text-secondary mb-24" style="font-size:14px;" x-text="canEdit ? 'Create a new scout and assign it to this workspace.' : 'No scouts have been added to this workspace yet.'"></p>
                        <template x-if="canEdit">
                            <a href="/scouts/new" class="btn-primary">Create Scout</a>
                        </template>
                    </div>
                </template>
                <div class="scouts-grid">
                    <template x-for="scout in scouts" :key="scout.id">
                        <div class="card card-body card-interactive"
                             @click="navigateTo('/scouts/' + scout.id)">
                            <div class="flex items-start justify-between mb-12">
                                <h3 class="text-primary text-truncate flex-1 mr-12" style="font-size:16px;font-weight:600;" x-text="scout.name"></h3>
                                <span :class="scout.status === 'active' ? 'status-active' : (scout.status === 'once' ? 'status-active' : 'status-paused')" x-text="scout.status === 'once' ? 'one-time' : scout.status"></span>
                            </div>
                            <p class="text-secondary line-clamp-2 mb-16" style="font-size:14px;" x-text="scout.topic"></p>
                            <div class="flex items-center justify-between flex-wrap gap-4 text-xs text-muted">
                                <span x-text="scout.last_run_at ? 'Last run: ' + formatTime(scout.last_run_at) : 'Not run yet'"></span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- ═══ MEMBERS TAB ═══ -->
            <div x-show="tab === 'members'" x-cloak>

                <!-- Invite Form (owner only) -->
                <template x-if="isOwner">
                    <div class="card card-body mb-24">
                        <p class="section-label mb-12">Send Invitation</p>
                        <div style="display:grid;grid-template-columns:1fr 160px auto;gap:12px;align-items:end;">
                            <div>
                                <label class="text-muted" style="font-size:12px;font-weight:500;display:block;margin-bottom:6px;">Email</label>
                                <input x-model="inviteEmail" type="email" class="input" placeholder="user@example.com" style="height:42px;" @keydown.enter="inviteMember()" />
                            </div>
                            <div>
                                <label class="text-muted" style="font-size:12px;font-weight:500;display:block;margin-bottom:6px;">Role</label>
                                <select x-model="inviteRole" class="input" style="height:42px;">
                                    <option value="editor">Editor</option>
                                    <option value="commenter">Commenter</option>
                                    <option value="viewer">Viewer</option>
                                </select>
                            </div>
                            <button @click="inviteMember()" :disabled="!inviteEmail.trim() || inviting" class="btn-primary"
                                    style="height:42px;padding:0 20px;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-width:120px;">
                                <span x-show="!inviting">Send Invite</span>
                                <span x-show="inviting" class="spinner-sm" style="width:16px;height:16px;"></span>
                            </button>
                        </div>
                    </div>
                </template>

                <!-- Invite Links (owner only) -->
                <template x-if="isOwner">
                    <div class="card card-body mb-24">
                        <div class="flex items-center justify-between mb-12" style="gap:12px;">
                            <div>
                                <p class="section-label" style="margin-bottom:2px;">Invite Links</p>
                                <p class="text-muted" style="font-size:12px;margin:0;">Shareable links. Disable a link to stop new joins without deleting its history.</p>
                            </div>
                            <button @click="generateInviteLink()" :disabled="generatingLink" class="btn-secondary btn-sm"
                                    style="font-size:12px;height:34px;padding:0 14px;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;min-width:130px;justify-content:center;">
                                <span x-show="!generatingLink">+ New Link</span>
                                <span x-show="generatingLink" class="spinner-sm" style="width:14px;height:14px;"></span>
                            </button>
                        </div>
                        <template x-if="inviteLinks.length === 0">
                            <p class="text-muted" style="font-size:12px;margin:8px 0 0;">No invite links yet. Generate one to start sharing.</p>
                        </template>
                        <template x-if="inviteLinks.length > 0">
                            <div style="display:flex;flex-direction:column;gap:10px;">
                                <template x-for="link in inviteLinks" :key="link.id">
                                    <div style="border:1px solid var(--border);border-radius:10px;padding:10px 12px;background:var(--surface);"
                                         :style="link.enabled ? '' : 'opacity:.55;'">
                                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                                            <input type="text" :value="inviteLinkUrlFor(link.token)" class="input" readonly
                                                   style="flex:1;min-width:220px;font-size:12.5px;height:36px;font-family:'IBM Plex Mono',monospace;" />
                                            <button @click="copyLinkToken(link.token)" class="btn-secondary btn-sm"
                                                    style="font-size:12px;height:36px;white-space:nowrap;">Copy</button>
                                            <button @click="toggleInviteLink(link)" class="btn-secondary btn-sm"
                                                    style="font-size:12px;height:36px;white-space:nowrap;min-width:80px;"
                                                    x-text="link.enabled ? 'Disable' : 'Enable'"></button>
                                            <button @click="deleteInviteLink(link)" class="btn-danger btn-sm"
                                                    style="font-size:12px;height:36px;padding:0 12px;white-space:nowrap;">Delete</button>
                                        </div>
                                        <div class="text-muted" style="font-size:11px;margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;">
                                            <span>Created <span x-text="formatTime(link.created_at)"></span></span>
                                            <span>·</span>
                                            <span x-text="link.enabled ? 'Active' : 'Disabled'"
                                                  :style="link.enabled ? 'color:var(--mint);' : 'color:var(--text-muted);'"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Pending Invitations (owner only) -->
                <template x-if="isOwner && pendingInvitations.length > 0">
                    <div class="card mb-24" style="overflow:hidden;">
                        <div style="padding:14px 16px;border-bottom:1px solid var(--border);">
                            <p class="section-label" style="margin-bottom:0;">Pending Invitations</p>
                        </div>
                        <div style="overflow-x:auto;">
                            <table class="report-table" style="min-width:400px;">
                                <thead>
                                    <tr>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th>Sent</th>
                                        <th style="width:80px;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="inv in pendingInvitations" :key="inv.id">
                                        <tr>
                                            <td class="text-secondary" x-text="inv.email"></td>
                                            <td><span class="r-badge r-badge-default" x-text="inv.role"></span></td>
                                            <td class="text-muted" x-text="formatTime(inv.created_at)"></td>
                                            <td>
                                                <button @click="cancelInvitation(inv)" class="btn-danger btn-sm" style="font-size:11px;padding:4px 10px;">Cancel</button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </template>

                <!-- Members Table -->
                <div class="card" style="overflow:hidden;">
                    <div style="overflow-x:auto;">
                        <table class="report-table" style="min-width:500px;">
                            <thead>
                                <tr>
                                    <th>Member</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th style="width:120px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="m in members" :key="m.id">
                                    <tr>
                                        <td>
                                            <div class="flex items-center gap-10">
                                                <div style="width:32px;height:32px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--text-secondary);"
                                                     x-text="(m.name || m.email)[0].toUpperCase()"></div>
                                                <span class="text-primary" style="font-weight:500;" x-text="m.name || 'Unnamed'"></span>
                                            </div>
                                        </td>
                                        <td class="text-secondary" x-text="m.email"></td>
                                        <td>
                                            <template x-if="isOwner && m.role !== 'owner'">
                                                <select :value="m.role" @change="changeRole(m, $event.target.value)" class="input" style="width:auto;height:32px;font-size:12px;padding:0 8px;">
                                                    <option value="editor">Editor</option>
                                                    <option value="commenter">Commenter</option>
                                                    <option value="viewer">Viewer</option>
                                                </select>
                                            </template>
                                            <template x-if="!isOwner || m.role === 'owner'">
                                                <span class="r-badge" :class="m.role === 'owner' ? 'r-badge-green' : (m.role === 'editor' ? 'r-badge-blue' : (m.role === 'commenter' ? 'r-badge-purple' : 'r-badge-default'))" x-text="m.role"></span>
                                            </template>
                                        </td>
                                        <td>
                                            <template x-if="isOwner && m.user_id !== currentUserId && m.role !== 'owner'">
                                                <button @click="removeMember(m)" class="btn-danger btn-sm" style="font-size:11px;padding:4px 10px;">Remove</button>
                                            </template>
                                            <template x-if="m.user_id === currentUserId && m.role !== 'owner'">
                                                <button @click="leaveWorkspace()" class="btn-danger btn-sm" style="font-size:11px;padding:4px 10px;">Leave</button>
                                            </template>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- ═══ ACTIVITY TAB ═══ -->
            <div x-show="tab === 'activity'" x-cloak>
                <template x-if="activityLoading">
                    <div style="text-align:center;padding:40px 0;">
                        <div class="spinner"></div>
                    </div>
                </template>

                <template x-if="!activityLoading && activityEvents.length === 0">
                    <div class="card empty-state">
                        <div class="empty-icon">
                            <svg width="28" height="28" fill="none" stroke="var(--deep-teal)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </div>
                        <h3 class="text-primary mb-8" style="font-size:18px;font-weight:600;">No activity yet</h3>
                        <p class="text-secondary" style="font-size:14px;">Activity will appear here as your team uses the workspace.</p>
                    </div>
                </template>

                <div x-show="activityEvents.length > 0" class="admin-timeline" style="max-width:700px;">
                    <template x-for="ev in activityEvents" :key="ev.id">
                        <div class="admin-timeline-item">
                            <div class="flex items-start gap-12">
                                <div style="flex:1;">
                                    <p class="text-primary" style="font-size:14px;font-weight:500;" x-text="ev.description"></p>
                                    <p class="text-muted" style="font-size:12px;" x-text="ev.user_name + ' &middot; ' + timeAgo(ev.created_at)"></p>
                                </div>
                                <span class="r-badge r-badge-default" style="font-size:9px;flex-shrink:0;" x-text="ev.event_type.replace('_', ' ')"></span>
                            </div>
                        </div>
                    </template>
                    <div x-show="activityHasMore" style="text-align:center;padding:20px 0;">
                        <button @click="loadMoreActivity()" class="btn-secondary btn-sm">Load More</button>
                    </div>
                </div>
            </div>

            <!-- Rename Modal -->
            <template x-if="showRenameModal">
                <div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;"
                     @click.self="showRenameModal = false" @keydown.escape.window="showRenameModal = false">
                    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:420px;">
                        <h3 class="text-primary mb-16" style="font-size:18px;font-weight:600;">Rename Workspace</h3>
                        <input x-model="renameName" type="text" class="input mb-16" :placeholder="workspace.name" @keydown.enter="renameWorkspace()" autofocus />
                        <div class="flex items-center justify-end gap-10">
                            <button @click="showRenameModal = false" class="btn-secondary btn-sm">Cancel</button>
                            <button @click="renameWorkspace()" :disabled="!renameName.trim()" class="btn-primary btn-sm">Save</button>
                        </div>
                    </div>
                </div>
            </template>

        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<script>
function workspacePage(workspaceId) {
    return {
        workspaceId,
        workspace: null,
        members: [],
        scouts: [],
        loading: true,
        tab: 'scouts',
        isOwner: false,
        canEdit: false,
        currentUserId: null,

        // Invite
        inviteEmail: '',
        inviteRole: 'editor',
        inviting: false,

        // Pending invitations
        pendingInvitations: [],

        // Invite links
        inviteLinks: [],
        generatingLink: false,

        // Rename
        showRenameModal: false,
        renameName: '',

        // Activity
        activityEvents: [],
        activityLoading: false,
        activityPage: 1,
        activityHasMore: false,

        async init() {
            try {
                const [ws, members] = await Promise.all([
                    apiCall(`/api/workspaces/${this.workspaceId}`),
                    apiCall(`/api/workspaces/${this.workspaceId}/members`),
                ]);
                this.workspace = ws;
                this.members = members;
                this.renameName = ws.name;


                // Check if current user is owner
                const me = await apiCall('/api/auth/me');
                this.currentUserId = me.id;
                const myMember = members.find(m => m.user_id === me.id);
                this.isOwner = myMember && myMember.role === 'owner';
                this.canEdit = myMember && !['viewer', 'commenter'].includes(myMember.role);

                // Fetch workspace scouts
                const allScouts = await apiCall('/api/scouts');
                this.scouts = allScouts.filter(s => s.workspace_id === this.workspaceId);

                // Load pending invitations + invite links (owner only)
                if (this.isOwner) {
                    try {
                        this.pendingInvitations = await apiCall(`/api/workspaces/${this.workspaceId}/invitations`);
                    } catch (e) {}
                    try {
                        this.inviteLinks = await apiCall(`/api/workspaces/${this.workspaceId}/invite-links`);
                    } catch (e) {}
                }
            } catch (e) {
                showToast(e.message, 'error');
            }
            this.loading = false;
        },

        inviteLinkUrlFor(token) {
            if (!token) return '';
            return window.location.origin + '/workspaces/join/' + token;
        },

        async inviteMember() {
            const email = this.inviteEmail.trim();
            if (!email) return;
            this.inviting = true;
            try {
                const res = await apiCall(`/api/workspaces/${this.workspaceId}/members`, 'POST', {
                    email, role: this.inviteRole,
                });
                this.inviteEmail = '';
                showToast(`Invitation sent to ${email}`);
                // Refresh pending invitations
                try {
                    this.pendingInvitations = await apiCall(`/api/workspaces/${this.workspaceId}/invitations`);
                } catch (e) {}
            } catch (e) {
                showToast(e.message, 'error');
            }
            this.inviting = false;
        },

        async cancelInvitation(inv) {
            if (!confirm(`Cancel invitation for ${inv.email}?`)) return;
            const prev = this.pendingInvitations;
            this.pendingInvitations = this.pendingInvitations.filter(i => i.id !== inv.id);
            apiCall(`/api/workspaces/${this.workspaceId}/invitations/${inv.id}`, 'DELETE')
                .then(() => showToast('Invitation cancelled'))
                .catch((e) => { this.pendingInvitations = prev; showToast(e.message, 'error'); });
        },

        async generateInviteLink() {
            if (this.generatingLink) return;
            this.generatingLink = true;
            try {
                const link = await apiCall(`/api/workspaces/${this.workspaceId}/invite-links`, 'POST');
                this.inviteLinks = [link, ...this.inviteLinks];
                showToast('Invite link generated');
            } catch (e) {
                showToast(e.message, 'error');
            }
            this.generatingLink = false;
        },

        async copyLinkToken(token) {
            try {
                await navigator.clipboard.writeText(this.inviteLinkUrlFor(token));
                showToast('Link copied');
            } catch (e) {
                showToast('Failed to copy', 'error');
            }
        },

        async toggleInviteLink(link) {
            // Optimistic flip for instant feedback.
            const prev = link.enabled;
            link.enabled = !link.enabled;
            try {
                const updated = await apiCall(
                    `/api/workspaces/${this.workspaceId}/invite-links/${link.id}`,
                    'PATCH',
                    { enabled: link.enabled },
                );
                Object.assign(link, updated);
                showToast(link.enabled ? 'Link enabled' : 'Link disabled');
            } catch (e) {
                link.enabled = prev;
                showToast(e.message, 'error');
            }
        },

        async deleteInviteLink(link) {
            if (!confirm('Delete this invite link permanently? This cannot be undone.')) return;
            const prev = this.inviteLinks;
            this.inviteLinks = this.inviteLinks.filter(l => l.id !== link.id);
            try {
                await apiCall(`/api/workspaces/${this.workspaceId}/invite-links/${link.id}`, 'DELETE');
                showToast('Invite link deleted');
            } catch (e) {
                this.inviteLinks = prev;
                showToast(e.message, 'error');
            }
        },

        async changeRole(member, newRole) {
            const prev = member.role;
            member.role = newRole;
            apiCall(`/api/workspaces/${this.workspaceId}/members/${member.id}`, 'PUT', { role: newRole })
                .then(() => showToast('Role updated'))
                .catch((e) => { member.role = prev; showToast(e.message, 'error'); });
        },

        async removeMember(member) {
            if (!confirm(`Remove ${member.name || member.email} from this workspace?`)) return;
            const prev = this.members;
            this.members = this.members.filter(m => m.id !== member.id);
            apiCall(`/api/workspaces/${this.workspaceId}/members/${member.id}`, 'DELETE')
                .then(() => showToast('Member removed'))
                .catch((e) => { this.members = prev; showToast(e.message, 'error'); });
        },

        async leaveWorkspace() {
            const name = (this.workspace && this.workspace.name) || 'this workspace';
            if (!confirm(`Leave ${name}? You will lose access to its scouts and reports.`)) return;
            try {
                await apiCall(`/api/workspaces/${this.workspaceId}/leave`, 'POST');
                showToast('You left the workspace');
                // Redirect to dashboard since the user no longer has access here.
                window.location.href = '/';
            } catch (e) {
                showToast(e.message, 'error');
            }
        },

        async loadActivity() {
            if (this.activityEvents.length > 0) return; // already loaded
            this.activityLoading = true;
            this.activityPage = 1;
            try {
                const res = await apiCall(`/api/workspaces/${this.workspaceId}/activity?page=1&per_page=30`);
                this.activityEvents = res.events;
                this.activityHasMore = res.has_more;
            } catch (e) {
                showToast(e.message, 'error');
            }
            this.activityLoading = false;
        },

        async loadMoreActivity() {
            this.activityPage++;
            try {
                const res = await apiCall(`/api/workspaces/${this.workspaceId}/activity?page=${this.activityPage}&per_page=30`);
                this.activityEvents.push(...res.events);
                this.activityHasMore = res.has_more;
            } catch (e) {
                showToast(e.message, 'error');
            }
        },

        async renameWorkspace() {
            const name = this.renameName.trim();
            if (!name) return;
            try {
                this.workspace = await apiCall(`/api/workspaces/${this.workspaceId}`, 'PUT', { name });
                this.showRenameModal = false;
                showToast('Workspace renamed');
            } catch (e) {
                showToast(e.message, 'error');
            }
        },

        async deleteWorkspace() {
            if (!confirm('Delete this workspace? All scouts and reports in it will be permanently deleted.')) return;
            invalidateCache('/api/workspaces');
            invalidateCache('/api/scouts');
            showToast('Workspace deleted');
            navigateTo('/');
            apiCall(`/api/workspaces/${this.workspaceId}`, 'DELETE').catch((e) => showToast(e.message, 'error'));
        },

        formatTime(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
        },

        timeAgo(iso) {
            if (!iso) return '';
            const diff = Date.now() - new Date(iso).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            const days = Math.floor(hrs / 24);
            if (days < 7) return days + 'd ago';
            return new Date(iso).toLocaleDateString();
        },
    }
}
</script>
