                                onmouseover="this.style.borderColor='var(--deep-teal)';this.style.background='rgba(16,185,129,.06)'" onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--surface)'">
                            <svg width="16" height="16" fill="none" stroke="var(--text-muted)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
                            <div>
                                <p style="font-size:14px;font-weight:500;color:var(--text-primary);" x-text="col.name"></p>
                                <p style="font-size:12px;color:var(--text-muted);" x-text="(col.item_count || 0) + ' items'"></p>
                            </div>
                        </button>
                    </template>
                    <div x-show="pinCollections.length === 0" class="text-muted" style="font-size:13px;text-align:center;padding:16px 0;">
                        No collections yet. <a href="/collections" style="color:var(--deep-teal);text-decoration:underline;">Create one</a>
                    </div>
                </div>
                <div class="flex items-center justify-end mt-16">
                    <button @click="showPinModal = null" class="btn-secondary btn-sm">Cancel</button>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══ HIGHLIGHT POPOVER ═══ -->
    <template x-if="hlPopover">
        <div class="hl-popover" :style="'left:' + hlPopover.x + 'px;top:' + hlPopover.y + 'px;'" @click.stop @mousedown.stop>
            <div class="flex items-center gap-6 mb-8">
                <button @click="hlColor='yellow'" class="hl-color-dot" :class="hlColor==='yellow'?'hl-color-active':''" style="background:rgba(250,204,21,.5)"></button>
                <button @click="hlColor='green'" class="hl-color-dot" :class="hlColor==='green'?'hl-color-active':''" style="background:rgba(16,185,129,.4)"></button>
                <button @click="hlColor='blue'" class="hl-color-dot" :class="hlColor==='blue'?'hl-color-active':''" style="background:rgba(99,102,241,.4)"></button>
                <button @click="hlColor='pink'" class="hl-color-dot" :class="hlColor==='pink'?'hl-color-active':''" style="background:rgba(244,114,182,.4)"></button>
            </div>
            <input x-model="hlCaption" @keydown.enter="saveHighlight()" placeholder="Add a note (optional)..." class="input"
                   style="font-size:12px;height:32px;margin-bottom:8px;border-radius:8px;">
            <div class="flex gap-6">
                <button @click="saveHighlight()" class="btn-primary btn-sm" style="flex:1;font-size:11px;height:28px;">Highlight</button>

    <!-- ═══ HIGHLIGHT TOOLTIP ═══ -->
    <template x-if="hlTooltip">
        <div class="hl-tooltip" :style="'left:' + hlTooltip.x + 'px;top:' + hlTooltip.y + 'px;'"
             @mouseenter="_hlTooltipHover=true" @mouseleave="_hlTooltipHover=false; setTimeout(()=>{if(!_hlTooltipHover)hlTooltip=null},50)">
            <p x-show="hlTooltip.caption" style="font-size:12px;color:var(--text-primary);margin-bottom:4px;line-height:1.5;" x-text="hlTooltip.caption"></p>
            <p style="font-size:11px;color:var(--text-muted);" x-text="'— ' + hlTooltip.user"></p>
            <template x-if="hlTooltip.isOwn">
                <button @click="deleteHighlight(hlTooltip.hlId, hlTooltip.reportId)"
                        style="margin-top:6px;padding:2px 8px;font-size:10px;border-radius:4px;border:1px solid rgba(239,68,68,.3);background:transparent;color:var(--badge-red);cursor:pointer;transition:all .15s;"
                        onmouseover="this.style.background='rgba(239,68,68,.1)'" onmouseout="this.style.background='transparent'">
                    Remove
                </button>
            </template>
        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<script>
function scoutDetail(scoutId) {
    return {
        scoutId, scout: null, reports: [], loading: true, running: false,
        activeTab: 'runs', toggledSources: null, canEdit: true, canComment: true,
        currentReportIndex: 0, showFollowUpChat: false, chatInputFocused: false,

        /* Progress tracking */
        progressSteps: [],
        progressPercent: 0,

        /* Report detail state */
        selectedReportId: null, selectedReport: null,
        sd: null, isStructured: false,
        citations: [],

        /* Follow-up chat */
        chatMessages: [],
        chatInput: '',
        chatLoading: false,

        /* Change tracking cache */
        _changesCache: {},
        toggledChanges: null,

        /* Highlights */
        _highlights: {},
        _hlVersion: 0,
        _currentUserId: null,
        hlPopover: null,
        hlCaption: '',
        hlColor: 'yellow',
        hlTooltip: null,
        _hlTooltipHover: false,
        _hlTooltipTimer: null,

        /* Reactions state */
        _reactions: {},
        _reactionsVersion: 0,
        emojiMap: { fire: '\uD83D\uDD25', thumbs_up: '\uD83D\uDC4D', brain: '\uD83E\uDDE0', eyes: '\uD83D\uDC40', rocket: '\uD83D\uDE80', hundred: '\uD83D\uDCAF' },
        emojiKeys: ['fire', 'thumbs_up', 'brain', 'eyes', 'rocket', 'hundred'],
        showEmojiPicker: null,

        /* Comments state */
        _comments: {},
        _commentsVersion: 0,
        expandedComments: null,
        commentInput: {},
        replyTo: {},

        /* Presence state */
        _presenceViewers: [],
        _subscribedReportIds: [],
        _presenceByReport: {},
        _wsCleanups: [],

        /* Collections state */
        showPinModal: null,
        pinCollections: [],
        pinNote: '',

        /* Artifacts state */
        artifactFilter: 'all',
        previewArtifact: null,
        showPreviewModal: false,

        get artifactCount() {
            let count = 0;
            for (const report of this.reports) {
                const f = report.findings || {};
                const exports = f.exports || {};
                count += Object.keys(exports).filter(k => exports[k] && exports[k].data).length;
            }
            return count;
        },

        getAllArtifacts() {
            const artifacts = [];
            for (const report of this.reports) {
                const f = report.findings || {};
                const exports = f.exports || {};
                const meta = f.meta || {};
                for (const [key, exp] of Object.entries(exports)) {
                    if (!exp || !exp.data) continue;
                    const isChart = key.startsWith('chart_');
                    const type = isChart ? 'chart' : key;
                    artifacts.push({
                        id: `${report.id}-${key}`,
                        reportId: report.id,
                        reportTitle: report.title,
                        exportKey: key,
                        type, isChart,
                        filename: exp.filename || `${key}.${this.getExtForType(type)}`,
                        mimeType: exp.mime_type || '',
                        description: exp.description || this.getDefaultDescription(type),
                        createdAt: exp.created_at || meta.timestamp || report.created_at,
                        sizeBytes: exp.size_bytes || Math.ceil((exp.data.length) * 3 / 4),
                        data: exp.data,
                    });
                }
            }
            artifacts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            return artifacts;
        },

        get filteredArtifacts() {
            const all = this.getAllArtifacts();
            if (this.artifactFilter === 'all') return all;
            return all.filter(a => a.type === this.artifactFilter);
        },

        get artifactTypes() {
            return [...new Set(this.getAllArtifacts().map(a => a.type))];
        },

        getExtForType(type) {
            return { pdf:'pdf', excel:'xlsx', html:'html', csv:'csv', txt:'txt', pptx:'pptx', chart:'png' }[type] || type;
        },
        getDefaultDescription(type) {
            return { pdf:'Formatted PDF report with styled table layout', excel:'Excel spreadsheet with structured data', html:'Interactive HTML page with data table', csv:'Raw CSV data export', txt:'Plain text report', pptx:'PowerPoint presentation with data slides', chart:'Data visualization chart' }[type] || 'Generated file';
        },
        getArtifactTypeLabel(type) {

            return sd.rows.slice(0, 8).map(row => {
                const title = titleCol ? (row[titleCol.key] || '') : '';
                const parts = detailCols.map(c => { const val = row[c.key]; if (!val || val === '\u2014') return ''; if (Array.isArray(val)) return val.join(', '); return String(val); }).filter(Boolean);
                return { title, detail: parts.length > 0 ? ' \u2014 ' + parts.join('; ') : '', source: badgeCol ? (row[badgeCol.key] || '') : '', url: linkCol ? (row[linkCol.key] || '') : '' };

        formatAnalysis(text) {
            if (!text) return '';

                let escaped = p.trim().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--text-primary);">$1</strong>').replace(/\n/g, '<br>');

        hasArtifacts(report) { const exports = (report.findings || {}).exports || {}; return Object.keys(exports).filter(k => exports[k] && exports[k].data).length > 0; },
        getTimeSaved(report) { const sd = (report.findings || {}).structured_data; if (!sd || !sd.rows) return '5'; return String(Math.max(5, sd.rows.length * 3)); },
        getAgentCount(report) { return ((report.findings || {}).meta || {}).agents_used || 1; },
        getCharts(report) { return (report.findings || {}).charts || []; },
        getSandboxAnalysis(report) { return (report.findings || {}).sandbox_analysis || ''; },
        getChartCommentary(report, chartIndex) {
            const analysis = this.getSandboxAnalysis(report);

            if (charts.length <= 1) return analysis;
            const paragraphs = analysis.split(/\n\n+/).filter(p => p.trim());
            if (paragraphs.length === 0) return chartIndex === 0 ? analysis : '';
            const perChart = Math.ceil(paragraphs.length / charts.length);
            const start = chartIndex * perChart;
            return paragraphs.slice(start, start + perChart).join('\n\n');

        getStrategy(report) { const s = ((report.findings || {}).meta || {}).strategy || ''; if (s === 'serpapi_google_shopping') return 'Product Search'; if (s === 'openai') return 'Multi-Agent Research'; return ''; },

        getExportLabel(key) { const labels = { pdf:'PDF', excel:'Excel', html:'HTML', pptx:'PowerPoint', csv:'CSV', txt:'Text' }; if (labels[key]) return labels[key]; if (key.startsWith('chart_')) return 'Chart ' + key.split('_')[1]; return key.toUpperCase(); },


        _progressMap: {
            started:{idx:0,pct:5,label:'Analyzing your query...'},strategy:{idx:1,pct:10,label:'Selecting search strategy'},subtasks:{idx:2,pct:15,label:'Creating research tasks'},agents_running:{idx:3,pct:20,label:'AI agents researching...'},agents_done:{idx:4,pct:50,label:'Research complete'},analysis:{idx:5,pct:60,label:'Writing analysis...'},merged:{idx:6,pct:68,label:'Compiling data'},charts:{idx:7,pct:75,label:'Generating visualizations...'},exports:{idx:8,pct:85,label:'Creating reports...'},saving:{idx:9,pct:95,label:'Saving report...'},complete:{idx:10,pct:100,label:'Done!'},

        _initProgressSteps() {

            this.progressSteps = keys.map(k => ({ key: k, message: this._progressMap[k].label, status: 'pending' }));
        },
        _handleProgressEvent(data) {
            const ev = data.event; if (ev === 'heartbeat') return;
            const mapped = this._progressMap[ev]; if (!mapped) return;
            const step = this.progressSteps.find(s => s.key === ev);
            if (step && data.message) step.message = data.message;
            for (const s of this.progressSteps) { const sm = this._progressMap[s.key]; if (sm.idx < mapped.idx) s.status = 'done'; else if (sm.idx === mapped.idx) s.status = ev === 'complete' ? 'done' : 'active'; else s.status = 'pending'; }
            this.progressPercent = mapped.pct;

        async runNow() {
            this.running = true; this.progressPercent = 0; this._initProgressSteps(); this.activeTab = 'runs';
            try {
                const response = await fetch(`/api/scouts/${this.scoutId}/run-stream`, { method: 'POST' });
                const reader = response.body.getReader(); const decoder = new TextDecoder(); let buffer = '';
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n'); buffer = lines.pop();
                    for (const line of lines) { if (line.startsWith('data: ')) { try { this._handleProgressEvent(JSON.parse(line.slice(6))); } catch (e) {} } }
                }
                if (buffer.startsWith('data: ')) { try { this._handleProgressEvent(JSON.parse(buffer.slice(6))); } catch (e) {} }
                showToast('Scout run completed!');
                this.scout = await apiCall(`/api/scouts/${this.scoutId}`);
                this.reports = await apiCall(`/api/scouts/${this.scoutId}/reports`);
                this.reports.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                this.currentReportIndex = 0;
                if (this.reports.length > 0) { this.selectedReportId = this.reports[0].id; this.loadArtifact(this.reports[0]); }

        applyHighlights(html, reportId) {
            // Reference _hlVersion so Alpine re-evaluates when highlights change
            void this._hlVersion;
            const hls = this._highlights[reportId] || [];
            if (!hls.length) return html;
            let result = html;
            for (const hl of hls) {
                const text = hl.selected_text;
                if (!text) continue;
                const idx = result.indexOf(text);
                if (idx === -1) continue;
                const mark = `<mark class="rh" data-caption="${this._escAttr(hl.caption||'')}" data-user="${this._escAttr(hl.user_name||hl.user_email||'')}" data-hlid="${hl.id}" data-uid="${hl.user_id}" data-reportid="${reportId}" style="--hl:${this._hlColorVal(hl.color)}">`;

        handleTextSelection(event, reportId) {

        async saveHighlight() {
            if (!this.hlPopover) return;
            const { text, reportId } = this.hlPopover;

            const color = this.hlColor;

            // Close the popover and clear the selection immediately — feels instant.
            this.hlPopover = null;
            window.getSelection().removeAllRanges();

            // Optimistic insert with a temp id; reconcile after the server responds.
            const tempId = 'tmp-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
            const optimistic = {
                id: tempId,
                report_id: reportId,
                user_id: this._currentUserId,
                user_name: null,
                user_email: '',
                selected_text: text,
                caption,
                color,
                created_at: new Date().toISOString(),
            };
            if (!this._highlights[reportId]) this._highlights[reportId] = [];
            this._highlights[reportId] = [...this._highlights[reportId], optimistic];
            this._hlVersion++;

            try {
                const hl = await apiCall(`/api/reports/${reportId}/highlights`, 'POST', {
                    selected_text: text,
                    caption,
                    color,
                });
                // Swap the temp entry for the real server row.
                this._highlights[reportId] = this._highlights[reportId].map(h =>
                    h.id === tempId ? hl : h
                );
                this._hlVersion++;
            } catch (e) {
                // Rollback on failure.
                this._highlights[reportId] = this._highlights[reportId].filter(h => h.id !== tempId);

                showToast(e.message || 'Failed to save highlight', 'error');

        async toggleReaction(reportId, emoji) {

            const prev = (this._reactions[reportId] || []).map(r => ({ ...r }));
            const next = [...prev];
            const existing = next.find(r => r.emoji === emoji);
            if (existing) {
                if (existing.user_reacted) {
                    existing.count = Math.max(0, existing.count - 1);
                    existing.user_reacted = false;
                } else {
                    existing.count += 1;
                    existing.user_reacted = true;
                }
            } else {
                next.push({ emoji, count: 1, user_reacted: true });
            }
            this._reactions[reportId] = next.filter(r => r.count > 0);
            this._reactionsVersion++;

            try {
                await apiCall(`/api/reports/${reportId}/reactions`, 'POST', { emoji });

            const content = (this.commentInput[reportId] || '').trim();
            if (!content) return;
            const parentId = this.replyTo[reportId] || null;
            // Clear input immediately so the UI feels instant.
            this.commentInput[reportId] = '';
            this.replyTo[reportId] = null;
            try {
                const created = await apiCall(`/api/reports/${reportId}/comments`, 'POST', { content, parent_id: parentId });
                if (!this._comments[reportId]) this._comments[reportId] = [];
                // Avoid dupes in case the WS echo arrives somehow.
                if (!this._comments[reportId].some(c => String(c.id) === String(created.id))) {
                    this._comments[reportId] = [...this._comments[reportId], created];
                    this._commentsVersion++;
                }
            } catch (e) {
                // Restore the user's draft so they don't lose it.
                this.commentInput[reportId] = content;
                this.replyTo[reportId] = parentId;
                showToast(e.message, 'error');
            }
        },
        async deleteComment(commentId, reportId) {
            if (!confirm('Delete this comment?')) return;
            // Optimistic remove.
            const prev = this._comments[reportId] || [];
            this._comments[reportId] = prev.filter(c => String(c.id) !== String(commentId));
            this._commentsVersion++;
            try {
                await apiCall(`/api/comments/${commentId}`, 'DELETE');
                showToast('Comment deleted');
            } catch (e) {
                this._comments[reportId] = prev;
                this._commentsVersion++;
                showToast(e.message, 'error');
            }
        },
        setReply(reportId, comment) {
            this.replyTo[reportId] = comment.id;
            this.commentInput[reportId] = `@${comment.user_email} `;
        },
        cancelReply(reportId) {
            this.replyTo[reportId] = null;
            this.commentInput[reportId] = '';
        },

        /* ── WebSocket: Listeners + Presence (unified) ── */
        _initWSListeners() {
            if (!window.LawaWS) return;
            const self = this;
            this._cleanupWSListeners();

            // Helper: send subscribe for all tracked reports
            function subscribeAll() {
                for (const rid of self._subscribedReportIds) {
                    window.LawaWS.send({ action: 'subscribe_report', report_id: rid });
                }
            }

            // On every WS (re)connection: re-subscribe to reports
            // This handles initial connect AND reconnects after drops
            const offConnected = window.LawaWS.on('connected', () => {
                subscribeAll();
            });
            // Also subscribe now if already connected
            if (window.LawaWS.connected) subscribeAll();

            // Presence updates — track per-report, then union for display.
            const offPresence = window.LawaWS.on('presence', (data) => {
                if (!data.report_id || !Array.isArray(data.viewers)) return;
                self._presenceByReport[data.report_id] = data.viewers;
                const seen = new Map();
                for (const vl of Object.values(self._presenceByReport)) {
                    for (const v of vl) if (v && v.user_id) seen.set(v.user_id, v);
                }
                self._presenceViewers = [...seen.values()];
            });

            // Real-time comments from other users
            const offComment = window.LawaWS.on('new_comment', (data) => {
                const reportId = data.report_id;
                if (!reportId) return;
                if (!self._comments[reportId]) self._comments[reportId] = [];
                // Guard against dupes (e.g. our own echo).
                if (!self._comments[reportId].some(c => String(c.id) === String(data.id))) {
                    self._comments[reportId] = [...self._comments[reportId], data];
                    self._commentsVersion++;
                }
            });

            // Real-time comment deletions
            const offCommentDel = window.LawaWS.on('comment_deleted', (data) => {
                const { report_id: reportId, id } = data;
                if (!reportId || !id) return;
                if (self._comments[reportId]) {
                    self._comments[reportId] = self._comments[reportId].filter(c => String(c.id) !== String(id));
                    self._commentsVersion++;
                }
            });

            // Real-time reaction updates from other users — patch local state, no refetch.
            const offReaction = window.LawaWS.on('reaction_update', (data) => {
                const { report_id: reportId, emoji, action } = data;
                if (!reportId || !emoji) return;
                const list = [...(self._reactions[reportId] || [])];
                const existing = list.find(r => r.emoji === emoji);
                if (action === 'added') {
                    if (existing) existing.count += 1;
                    else list.push({ emoji, count: 1, user_reacted: false });
                } else if (action === 'removed' && existing) {
                    existing.count = Math.max(0, existing.count - 1);
                }
                self._reactions[reportId] = list.filter(r => r.count > 0);
                self._reactionsVersion++;
            });

            // Real-time highlights from other users
            const offHighlight = window.LawaWS.on('new_highlight', (data) => {
                const reportId = data.report_id;
                if (!reportId) return;
                if (!self._highlights[reportId]) self._highlights[reportId] = [];
                self._highlights[reportId] = [...self._highlights[reportId], data];
                self._hlVersion++;
            });

            // Highlight deleted by another user
            const offHlDelete = window.LawaWS.on('highlight_deleted', (data) => {
                const reportId = data.report_id;
                const hlId = data.id;
                if (!reportId || !hlId) return;
                if (self._highlights[reportId]) {
                    self._highlights[reportId] = self._highlights[reportId].filter(h => String(h.id) !== String(hlId));
                    self._hlVersion++;
                }
            });

            this._wsCleanups = [offConnected, offPresence, offComment, offCommentDel, offReaction, offHighlight, offHlDelete];
        },

        _connectPresence(reportIds) {
            this._subscribedReportIds = reportIds;
            // Subscribe now if WS is already connected; otherwise the
            // 'connected' handler registered in _initWSListeners will do it
            if (window.LawaWS && window.LawaWS.connected) {
                for (const rid of this._subscribedReportIds) {
                    window.LawaWS.send({ action: 'subscribe_report', report_id: rid });
                }
            }
        },

        _disconnectPresence() {
            if (window.LawaWS && window.LawaWS.connected) {
                for (const rid of this._subscribedReportIds) {
                    window.LawaWS.send({ action: 'unsubscribe_report', report_id: rid });
                }
            }
            this._subscribedReportIds = [];
            this._presenceByReport = {};
            this._presenceViewers = [];
        },

        _cleanupWSListeners() {
            if (this._wsCleanups) {
                this._wsCleanups.forEach(fn => { if (fn) fn(); });
                this._wsCleanups = [];
            }
        },

        /* ── Collections Pin ── */
        async openPinModal(reportId) {
            this.showPinModal = reportId;
            this.pinNote = '';
            try {
                this.pinCollections = await apiCall('/api/collections');
            } catch (e) { this.pinCollections = []; }
        },
        async pinToCollection(collectionId, reportId) {
            try {
                await apiCall(`/api/collections/${collectionId}/items`, 'POST', {
                    report_id: reportId,
                    note: this.pinNote.trim() || null,
                });
                showToast('Pinned to collection!');
                this.showPinModal = null;
            } catch (e) { showToast(e.message, 'error'); }
        },

        /* ── Time Helpers ── */
        timeAgo(iso) {
            if (!iso) return '';
            const diff = Date.now() - new Date(iso).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            const days = Math.floor(hrs / 24);
            if (days < 7) return days + 'd ago';
            return new Date(iso).toLocaleDateString();
        },

        formatRunDate(iso) {
            if (!iso) return '';
            const d = new Date(iso); const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
            const h = d.getHours(); const ampm = h >= 12 ? 'PM' : 'AM'; const h12 = h % 12 || 12;
            return `${months[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')}, ${d.getFullYear()} AT ${h12}:${String(d.getMinutes()).padStart(2,'0')}${ampm}`;
        },
        formatTime(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', {month:'2-digit',day:'2-digit',year:'numeric'}) + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
        },
        formatMarkdown(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\[(.*?)\]\((https?:\/\/.*?)\)/g, '<a href="$2" target="_blank" style="color:var(--deep-teal);text-decoration:underline;">$1</a>').replace(/^- /gm, '&bull; ').replace(/\n/g, '<br>');
        }
    }
}
</script>
