{% extends base_template|default("base.html") %}
{% block title %}Scout{% endblock %}

{% block content %}
<style>
    /* ── Report Highlights ── */
    mark.rh {
        background: var(--hl);
        border-radius: 2px;
        padding: 1px 0;
        cursor: pointer;
        transition: filter .15s;
    }
    mark.rh:hover { filter: brightness(1.15); }

    .hl-popover {
        position: fixed;
        transform: translate(-50%, -100%);
        margin-top: -12px;
        padding: 14px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow-card);
        z-index: 200;
        min-width: 230px;
    }
    .hl-color-dot {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 2.5px solid transparent;
        cursor: pointer;
        transition: all .15s;
    }
    .hl-color-dot:hover { transform: scale(1.15); }
    .hl-color-active { border-color: var(--text-primary); transform: scale(1.15); }

    .hl-tooltip {
        position: fixed;
        transform: translate(-50%, -100%);
        margin-top: -10px;
        padding: 10px 14px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: var(--shadow-card);
        z-index: 200;
        max-width: 280px;
    }

    /* ── Carousel ── */
    .carousel-nav { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;min-height:40px; }
    .carousel-btn {
        display:flex;align-items:center;justify-content:center;
        width:34px;height:34px;border-radius:10px;
        border:1px solid var(--border);background:var(--surface);
        cursor:pointer;color:var(--text-secondary);transition:all .15s;
    }
    .carousel-btn:hover:not([disabled]) { border-color:var(--border-light);color:var(--text-primary);background:var(--card); }
    .carousel-btn[disabled] { opacity:.3;cursor:not-allowed; }

    /* ── Floating Chat (bottom-center pill) ── */
    .fab-wrap { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;pointer-events:none; }
    .fab-wrap > * { pointer-events:auto; }
    .fab-pill {
        display:flex;align-items:center;gap:10px;
        min-width:320px;max-width:calc(100vw - 48px);
        padding:12px 20px;border-radius:28px;
        background:linear-gradient(135deg,var(--deep-teal),#059669);
        border:none;cursor:pointer;color:#fff;
        font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;
        box-shadow:0 6px 24px rgba(16,185,129,.35);transition:all .2s;
    }
    .fab-pill:hover { transform:translateY(-2px);box-shadow:0 8px 28px rgba(16,185,129,.45); }
    .fab-pill-close {
        width:44px;height:44px;border-radius:50%;
        background:linear-gradient(135deg,var(--deep-teal),#059669);
        border:none;cursor:pointer;color:#fff;
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 4px 20px rgba(16,185,129,.35);transition:all .2s;
    }
    .fab-pill-close:hover { transform:scale(1.08); }
    .fab-panel {
        width:480px;max-width:calc(100vw - 48px);max-height:500px;background:var(--card);
        border:1px solid var(--border);border-radius:16px;
        box-shadow:0 8px 40px rgba(0,0,0,.25);overflow:hidden;
        margin-bottom:12px;display:flex;flex-direction:column;
    }

    /* ── ChatGPT-style composer ── */
    .gpt-composer-wrap { padding:12px 14px 14px; }
    .gpt-composer {
        display:flex;align-items:flex-end;gap:8px;
        background:var(--card);
        border:1px solid var(--border);
        border-radius:26px;
        padding:10px 10px 10px 18px;
        box-shadow:0 2px 8px rgba(0,0,0,.04);
        transition:border-color .15s, box-shadow .15s;
    }
    .gpt-composer-focus {
        border-color:var(--text-muted);
        box-shadow:0 4px 16px rgba(0,0,0,.08);
    }
    .gpt-textarea {
        flex:1;border:none;outline:none;background:transparent;resize:none;
        font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;
        color:var(--text-primary);
        padding:7px 0;min-height:22px;max-height:160px;overflow-y:auto;
    }
    .gpt-textarea::placeholder { color:var(--text-muted); }
    .gpt-send {
        display:flex;align-items:center;justify-content:center;
        width:32px;height:32px;border-radius:50%;
        border:none;flex-shrink:0;
        background:var(--border);color:var(--card);
        cursor:not-allowed;transition:background .15s, transform .1s, opacity .15s;
        opacity:.7;
    }
    .gpt-send-active {
        background:var(--text-primary);color:var(--card);
        cursor:pointer;opacity:1;
    }
    .gpt-send-active:hover { transform:scale(1.06); }

    /* ── Action bar pills ── */
    .action-pill {
        display:inline-flex;align-items:center;gap:5px;
        padding:5px 12px;border-radius:20px;
        border:1px solid var(--border);background:var(--surface);
        font-size:12px;font-weight:500;color:var(--text-muted);
        cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;
    }
    .action-pill:hover { border-color:var(--border-light);color:var(--text-secondary); }
    .action-pill-active { background:rgba(16,185,129,.1);border-color:var(--deep-teal);color:var(--deep-teal); }
    .reaction-pill {
        display:inline-flex;align-items:center;gap:5px;
        padding:5px 12px;border-radius:20px;
        border:1px solid var(--border);font-size:13px;
        cursor:pointer;transition:all .15s;
    }
    .reaction-pill-active { background:rgba(16,185,129,.1);border-color:var(--deep-teal); }
    .reaction-pill-inactive { background:var(--surface); }
    .add-reaction-btn {
        display:inline-flex;align-items:center;justify-content:center;
        width:32px;height:32px;border-radius:50%;
        border:1px solid var(--border);background:var(--surface);
        cursor:pointer;font-size:14px;color:var(--text-muted);transition:all .15s;
    }
    .add-reaction-btn:hover { border-color:var(--border-light);color:var(--text-secondary); }
</style>
<div x-data="scoutDetail('{{ scout_id }}')" x-init="init()">

    <!-- Loading -->
    <template x-if="loading">
        <div style="text-align:center;padding:64px 0;">
            <div class="spinner"></div>
            <p class="text-muted mt-12" style="font-size:14px;">Loading scout...</p>
        </div>
    </template>

    <template x-if="!loading && scout">
        <div>
            <!-- Back -->
            <a href="/" class="back-link">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Back to Dashboard
            </a>

            <!-- Page Title -->
            <h1 class="page-title mb-12" x-text="scout.topic || scout.name"></h1>

            <!-- Presence Indicators -->
            <style>
                .presence-avatar {
                    display: inline-flex !important;
                    align-items: center !important;
                    justify-content: center !important;
                    width: 34px !important;
                    height: 34px !important;
                    min-width: 34px !important;
                    min-height: 34px !important;
                    border-radius: 50% !important;
                    font-size: 13px !important;
                    font-weight: 700 !important;
                    color: #fff !important;
                    cursor: pointer;
                    box-shadow: 0 2px 8px rgba(0,0,0,.15);
                    vertical-align: middle;
                    position: relative;
                }
                .presence-avatar::after {
                    content: attr(data-tip);
                    position: absolute;
                    bottom: calc(100% + 8px);
                    left: 50%;
                    transform: translateX(-50%) translateY(4px);
                    padding: 5px 12px;
                    border-radius: 6px;
                    background: var(--card);
                    border: 1px solid var(--border);
                    box-shadow: 0 4px 12px rgba(0,0,0,.2);
                    white-space: nowrap;
                    font-size: 12px;
                    font-weight: 500;
                    color: var(--text-primary);
                    opacity: 0;
                    pointer-events: none;
                    transition: opacity .15s, transform .15s;
                    z-index: 20;
                }
                .presence-avatar:hover::after {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
                .presence-avatar-0 { background: linear-gradient(135deg,#10b981,#059669) !important; }
                .presence-avatar-1 { background: linear-gradient(135deg,#6366f1,#4f46e5) !important; }
                .presence-avatar-2 { background: linear-gradient(135deg,#f59e0b,#d97706) !important; }
                .presence-avatar-3 { background: linear-gradient(135deg,#ec4899,#db2777) !important; }
                .presence-avatar-4 { background: linear-gradient(135deg,#22d3ee,#06b6d4) !important; }
                .presence-overflow {
                    display: inline-flex !important;
                    align-items: center !important;
                    justify-content: center !important;
                    width: 34px !important;
                    height: 34px !important;
                    min-width: 34px !important;
                    min-height: 34px !important;
                    border-radius: 50% !important;
                    font-size: 11px !important;
                    font-weight: 700 !important;
                    color: var(--text-secondary) !important;
                    background: var(--surface) !important;
                    border: 1px solid var(--border);
                    vertical-align: middle;
                }
            </style>
            <div x-show="_presenceViewers.length > 0" style="margin-bottom:24px;">
                <template x-for="(v, vi) in _presenceViewers.slice(0, 5)" :key="v.user_id">
                    <div class="presence-avatar"
                         :class="'presence-avatar-' + (vi % 5)"
                         :data-tip="v.name || v.email"
                         :style="vi > 0 ? 'margin-left:10px;' : ''"
                         x-text="(v.name || v.email || '?')[0].toUpperCase()"></div>
                </template>
                <template x-if="_presenceViewers.length > 5">
                    <div class="presence-overflow" style="margin-left:10px;"
                         x-text="'+' + (_presenceViewers.length - 5)"></div>
                </template>
            </div>
            <div x-show="_presenceViewers.length === 0" style="margin-bottom:24px;"></div>

            <!-- Tab Bar -->
            <div class="tab-bar">
                <div class="tab-bar-left">
                    <button class="tab-btn" :class="{'tab-btn-active': activeTab === 'runs'}" @click="activeTab = 'runs'">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                        Runs
                        <span class="tab-count" x-show="reports.length > 0" x-text="reports.length"></span>
                    </button>
                    <button class="tab-btn" :class="{'tab-btn-active': activeTab === 'artifacts'}" @click="activeTab = 'artifacts'">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                        Artifacts
                        <span class="tab-count" x-show="artifactCount > 0" x-text="artifactCount"></span>
                    </button>
                    <button class="tab-btn" :class="{'tab-btn-active': activeTab === 'details'}" @click="activeTab = 'details'">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        Details
                    </button>
                </div>
                <div class="tab-bar-right">
                    <span class="status-done" x-show="reports.length > 0">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                        Done
                    </span>
                    <span :class="scout.status === 'active' ? 'status-active' : 'status-paused'" x-text="scout.status"></span>
                    <template x-if="canEdit">
                        <button @click="runNow" :disabled="running" class="btn-primary btn-primary-xs">
                            <template x-if="running"><div class="spinner-sm"></div></template>
                            <span x-text="running ? 'Running...' : '+ Run'"></span>
                        </button>
                    </template>
                </div>
            </div>

            <!-- ═══ RUNS TAB ═══ -->
            <div x-show="activeTab === 'runs'" x-cloak>

                <!-- Progress Panel -->
                <template x-if="running && progressSteps.length > 0">
                    <div class="progress-panel">
                        <div class="flex items-center gap-10 mb-20">
                            <div class="analysis-icon">
                                <div class="spinner-sm" style="color:var(--deep-teal);"></div>
                            </div>
                            <p class="text-primary" style="font-size:14px;font-weight:600;">Running Scout</p>
                        </div>
                        <div class="flex flex-col gap-4">
                            <template x-for="(step, si) in progressSteps" :key="si">
                                <div class="progress-step" :class="step.status === 'done' ? 'progress-step-done' : step.status === 'active' ? 'progress-step-active' : 'progress-step-pending'">
                                    <div class="progress-step-icon">
                                        <template x-if="step.status === 'done'">
                                            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                                        </template>
                                        <template x-if="step.status === 'active'">
                                            <div style="width:8px;height:8px;background:var(--deep-teal);border-radius:50%;"></div>
                                        </template>
                                        <template x-if="step.status === 'pending'">
                                            <div style="width:6px;height:6px;background:var(--text-muted);border-radius:50%;opacity:.5;"></div>
                                        </template>
                                    </div>
                                    <span x-text="step.message"></span>
                                </div>
                            </template>
                        </div>
                        <div class="progress-bar-track">
                            <div class="progress-bar-fill" :style="'width:' + progressPercent + '%'"></div>
                        </div>
                        <p class="mono-pct" x-text="progressPercent + '%'"></p>
                    </div>
                </template>

                <!-- Empty State -->
                <template x-if="reports.length === 0 && !running">
                    <div class="card empty-state">
                        <div class="empty-icon">
                            <svg width="28" height="28" fill="none" stroke="var(--deep-teal)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                        </div>
                        <h3 class="text-primary mb-8" style="font-size:18px;font-weight:600;">No runs yet</h3>
                        <p class="text-secondary mb-24" style="font-size:14px;" x-text="canEdit ? 'Click \"Run\" to generate the first report.' : 'No reports have been generated yet.'"></p>
                        <template x-if="canEdit">
                            <button @click="runNow" :disabled="running" class="btn-primary">
                                <span x-text="running ? 'Running...' : 'Run Now'"></span>
                            </button>
                        </template>
                    </div>
                </template>

                <!-- Report Carousel Nav -->
                <template x-if="reports.length > 1">
                    <div class="carousel-nav">
                        <div class="flex items-center gap-10">
                            <button @click="currentReportIndex = Math.max(0, currentReportIndex - 1)"
                                    :disabled="currentReportIndex === 0" class="carousel-btn">
                                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                            </button>
                            <span class="text-secondary" style="font-size:13px;font-weight:500;min-width:52px;text-align:center;">
                                <span x-text="currentReportIndex + 1"></span>
                                <span class="text-muted" style="font-weight:400;"> / </span>
                                <span x-text="reports.length"></span>
                            </span>
                            <button @click="currentReportIndex = Math.min(reports.length - 1, currentReportIndex + 1)"
                                    :disabled="currentReportIndex === reports.length - 1" class="carousel-btn">
                                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                            </button>
                        </div>
                        <span class="text-muted" style="font-size:12px;" x-text="formatRunDate(reports[currentReportIndex].created_at)"></span>
                    </div>
                </template>

                <!-- Run Cards (carousel — one visible at a time) -->
                <template x-for="(report, reportIndex) in reports" :key="report.id">
                    <div x-show="reportIndex === currentReportIndex" class="card card-body-lg">

                        <!-- Date + Agent Badge -->
                        <div class="flex items-center justify-between flex-wrap gap-6" style="margin-bottom:4px;">
                            <p class="run-date" style="margin-bottom:0;" x-text="formatRunDate(report.created_at)"></p>
                            <div class="flex items-center flex-wrap gap-6">
                                <template x-if="getAgentCount(report) > 1">
                                    <span class="agent-chip">
                                        <span x-text="getAgentCount(report)"></span> agents
                                    </span>
                                </template>
                                <template x-if="getCharts(report).length > 0">
                                    <span class="agent-chip">
                                        <span x-text="getCharts(report).length"></span> chart<span x-show="getCharts(report).length > 1">s</span>
                                    </span>
                                </template>
                                <template x-if="getStrategy(report)">
                                    <span class="strategy-chip" x-text="getStrategy(report)"></span>
                                </template>
                            </div>
                        </div>

                        <!-- Title -->
                        <h2 class="run-title" x-text="report.title"></h2>

                        <!-- Change Tracking Badge -->
                        <template x-if="getChanges(report).hasChanges">
                            <div style="margin-top:-4px;margin-bottom:16px;">
                                <div class="flex flex-wrap items-center gap-8">
                                    <template x-if="getChanges(report).added > 0">
                                        <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(16,185,129,.12);color:var(--badge-green);border:1px solid rgba(16,185,129,.2);">
                                            <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg>
                                            <span x-text="getChanges(report).added + ' new'"></span>
                                        </span>
                                    </template>
                                    <template x-if="getChanges(report).removed > 0">
                                        <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(239,68,68,.12);color:var(--badge-red);border:1px solid rgba(239,68,68,.2);">
                                            <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M20 12H4"/></svg>
                                            <span x-text="getChanges(report).removed + ' removed'"></span>
                                        </span>
                                    </template>
                                    <template x-if="getChanges(report).changed > 0">
                                        <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(245,158,11,.12);color:var(--badge-amber);border:1px solid rgba(245,158,11,.2);">
                                            <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12h16"/></svg>
                                            <span x-text="getChanges(report).changed + ' updated'"></span>
                                        </span>
                                    </template>
                                    <button @click.stop="toggledChanges === report.id ? toggledChanges = null : toggledChanges = report.id"
                                            style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--surface);color:var(--text-secondary);border:1px solid var(--border);cursor:pointer;transition:all .15s;"
                                            :style="toggledChanges === report.id ? 'background:var(--deep-teal);color:#fff;border-color:var(--deep-teal);' : ''">
                                        <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                             :style="toggledChanges === report.id ? 'transform:rotate(90deg)' : ''" style="transition:transform .15s;">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"/>
                                        </svg>
                                        <span x-text="toggledChanges === report.id ? 'Hide details' : 'View details'"></span>
                                    </button>
                                </div>

                                <!-- Collapsible Change Details -->
                                <template x-if="toggledChanges === report.id">
                                    <div style="margin-top:12px;padding:16px;border-radius:12px;background:var(--surface);border:1px solid var(--border);font-size:13px;">

                                        <!-- AI Summary -->
                                        <template x-if="getChanges(report).summary">
                                            <p class="text-secondary" style="font-size:13px;line-height:1.6;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);" x-text="getChanges(report).summary"></p>
                                        </template>

                                        <!-- New Items -->
                                        <template x-if="getChanges(report).addedItems.length > 0">
                                            <div style="margin-bottom:14px;">
                                                <p style="font-weight:600;color:var(--badge-green);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">New</p>
                                                <template x-for="(item, ai) in getChanges(report).addedItems" :key="'a'+ai">
                                                    <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:4px;border-radius:8px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.1);">
                                                        <span style="color:var(--badge-green);font-weight:700;font-size:13px;">+</span>
                                                        <span class="text-primary" style="font-weight:500;font-size:13px;" x-text="item"></span>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>

                                        <!-- Removed Items -->
                                        <template x-if="getChanges(report).removedItems.length > 0">
                                            <div style="margin-bottom:14px;">
                                                <p style="font-weight:600;color:var(--badge-red);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Removed</p>
                                                <template x-for="(item, ri) in getChanges(report).removedItems" :key="'r'+ri">
                                                    <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:4px;border-radius:8px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.1);">
                                                        <span style="color:var(--badge-red);font-weight:700;font-size:13px;">&minus;</span>
                                                        <span class="text-primary" style="font-weight:500;font-size:13px;opacity:.7;" x-text="item"></span>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>

                                        <!-- Updated Items (AI-detected real changes) -->
                                        <template x-if="getChanges(report).updatedItems.length > 0">
                                            <div>
                                                <p style="font-weight:600;color:var(--badge-amber);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Updated</p>
                                                <template x-for="(item, ui) in getChanges(report).updatedItems" :key="'u'+ui">
                                                    <div style="display:flex;align-items:start;gap:8px;padding:8px 10px;margin-bottom:4px;border-radius:8px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.1);">
                                                        <span style="color:var(--badge-amber);font-weight:700;font-size:13px;margin-top:1px;">~</span>
                                                        <div>
                                                            <span class="text-primary" style="font-weight:600;font-size:13px;" x-text="item.name"></span>
                                                            <p class="text-muted" style="font-size:12px;margin-top:2px;" x-text="item.change"></p>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Highlightable content area -->
                        <div @mouseup="handleTextSelection($event, report.id)">

                        <!-- Summary -->
                        <p class="run-prose" x-html="applyHighlights(formatMarkdown(report.summary || ''), report.id, _hlVersion)"></p>

                        <!-- Narrative Items -->
                        <template x-if="getRunItems(report).length > 0">
                            <ul class="run-items">
                                <template x-for="(item, idx) in getRunItems(report)" :key="idx">
                                    <li>
                                        <strong x-text="item.title"></strong><span x-text="item.detail"></span>
                                        <template x-if="item.source">
                                            <a :href="item.url || '#'" target="_blank" rel="noopener" class="source-chip" @click.stop>
                                                <span class="source-chip-dot"></span>
                                                <span x-text="item.source"></span>
                                            </a>
                                        </template>
                                    </li>
                                </template>
                            </ul>
                        </template>

                        <!-- More items note -->
                        <template x-if="getRowCount(report) > 8">
                            <p class="more-items-note">
                                ...and <strong class="text-secondary" x-text="getRowCount(report) - 8"></strong> more items.
                            </p>
                        </template>

                        <!-- Text fallback -->
                        <template x-if="getRunItems(report).length === 0 && report.raw_response">
                            <div class="text-fallback" x-html="applyHighlights(formatMarkdown(report.raw_response || ''), report.id, _hlVersion)"></div>
                        </template>

                        <!-- Artifacts link -->
                        <template x-if="hasArtifacts(report)">
                            <p class="run-artifacts-note">
                                <a href="#" @click.prevent="viewArtifact(report)" class="source-chip source-chip-primary">
                                    <span class="source-chip-dot"></span>
                                    LAWA Scouts
                                </a>
                            </p>
                        </template>

                        <!-- Analysis & Key Findings -->
                        <template x-if="getAnalysis(report)">
                            <div class="analysis-box">
                                <div class="flex items-center gap-10 mb-16">
                                    <div class="analysis-icon">
                                        <svg width="16" height="16" fill="none" stroke="var(--deep-teal)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                                    </div>
                                    <p style="font-size:14px;font-weight:700;color:var(--deep-teal);">Analysis & Key Findings</p>
                                </div>
                                <div class="text-secondary" style="font-size:14px;line-height:1.8;"
                                     x-html="applyHighlights(formatAnalysis(getAnalysis(report)), report.id, _hlVersion)"></div>
                            </div>
                        </template>

                        <!-- Charts -->
                        <template x-if="getCharts(report).length > 0">
                            <div style="margin:24px 0;">
                                <p class="section-label mb-16">Data Analysis</p>
                                <div class="flex flex-col gap-24">
                                    <template x-for="(chart, ci) in getCharts(report)" :key="ci">
                                        <div class="chart-container">
                                            <div class="chart-img-wrap">
                                                <img :src="'data:image/png;base64,' + chart" style="width:100%;height:auto;display:block;border-radius:8px;" :alt="'Chart ' + (ci+1)" />
                                            </div>
                                            <template x-if="getChartCommentary(report, ci)">
                                                <div class="chart-commentary" x-html="formatMarkdown(getChartCommentary(report, ci))"></div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        </div><!-- end highlightable content area -->

                        <!-- Footer -->
                        <div class="run-footer">
                            <span>
                                Report generated by
                                <strong class="text-secondary" x-text="getAgentCount(report) + ' AI agents'"></strong>, saving you
                                ~<strong class="text-secondary" x-text="getTimeSaved(report)"></strong> minutes of web browsing time.
                            </span>
                            <div class="flex items-center flex-wrap gap-8">
                                <template x-if="hasExports(report)">
                                    <div class="flex flex-wrap gap-6">
                                        <template x-for="ek in getExportKeys(report)" :key="ek">
                                            <button @click="exportReport(report.id, ek)" class="export-btn">
                                                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                                                <span x-text="getExportLabel(ek)"></span>
                                            </button>
                                        </template>
                                    </div>
                                </template>
                                <button @click.stop="shareReport(report)" class="sources-toggle">
                                    <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                                    Share
                                </button>
                                <template x-if="getReportCitations(report).length > 0">
                                    <button @click="toggledSources === report.id ? toggledSources = null : toggledSources = report.id"
                                            class="sources-toggle"
                                            :class="toggledSources === report.id ? 'sources-toggle-active' : ''">
                                        <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101M10.172 13.828a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
                                        Sources
                                        <span style="font-size:10px;opacity:.8;" x-text="'(' + getReportCitations(report).length + ')'"></span>
                                    </button>
                                </template>
                            </div>
                        </div>

                        <!-- ── Reactions & Actions ── -->
                        <div class="flex items-center flex-wrap gap-6" style="margin-top:12px;">
                            <template x-for="r in getReactions(report.id)" :key="r.emoji">
                                <button @click="toggleReaction(report.id, r.emoji)"
                                        class="reaction-pill" :class="r.user_reacted ? 'reaction-pill-active' : 'reaction-pill-inactive'"
                                        :title="r.emoji">
                                    <span x-text="emojiMap[r.emoji] || r.emoji"></span>
                                    <span style="font-size:12px;font-weight:600;" :style="r.user_reacted ? 'color:var(--deep-teal);' : 'color:var(--text-secondary);'" x-text="r.count"></span>
                                </button>
                            </template>
                            <div style="position:relative;">
                                <button @click.stop="showEmojiPicker = showEmojiPicker === report.id ? null : report.id"
                                        class="add-reaction-btn" title="Add reaction">+</button>
                                <div x-show="showEmojiPicker === report.id" @click.away="showEmojiPicker = null" x-cloak
                                     style="position:absolute;bottom:calc(100% + 6px);left:0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;display:flex;gap:4px;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:50;">
                                    <template x-for="ek in emojiKeys" :key="ek">
                                        <button @click="toggleReaction(report.id, ek); showEmojiPicker = null"
                                                style="width:32px;height:32px;border:none;background:transparent;font-size:18px;cursor:pointer;border-radius:6px;transition:background .1s;"
                                                onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background='transparent'"
                                                x-text="emojiMap[ek]"></button>
                                    </template>
                                </div>
                            </div>
                            <button @click.stop="openPinModal(report.id)" class="action-pill" style="margin-left:auto;">
                                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
                                Pin
                            </button>
                            <button @click="toggleComments(report.id)" class="action-pill"
                                    :class="expandedComments === report.id ? 'action-pill-active' : ''">
                                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                                <span x-text="getCommentCount(report.id) > 0 ? getCommentCount(report.id) + ' Comments' : 'Comment'"></span>
                            </button>
                        </div>

                        <!-- Collapsible Sources Panel -->
                        <template x-if="toggledSources === report.id && getReportCitations(report).length > 0">
                            <div class="mt-20" style="padding-top:20px;border-top:1px solid var(--border);">
                                <p class="section-label mb-14">
                                    Sources &amp; Citations
                                    <span style="font-weight:400;text-transform:none;letter-spacing:0;" x-text="'(' + getReportCitations(report).length + ' sources)'"></span>
                                </p>
                                <div class="flex flex-col gap-8">
                                    <template x-for="(cite, ci) in getReportCitations(report)" :key="ci">
                                        <a :href="cite.url" target="_blank" rel="noopener" class="source-link">
                                            <div class="source-number" x-text="ci + 1"></div>
                                            <div class="min-w-0 flex-1">
                                                <p class="text-primary text-truncate" style="font-size:13px;font-weight:500;" x-text="cite.title || cite.url"></p>
                                                <p class="text-muted text-truncate" style="font-size:11px;" x-text="cite.url"></p>
                                            </div>
                                            <svg width="14" height="14" fill="none" stroke="var(--text-muted)" viewBox="0 0 24 24" class="shrink-0"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                                        </a>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- ── Comments Section ── -->
                        <template x-if="expandedComments === report.id">
                            <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border);">
                                <p class="section-label" style="margin-bottom:16px;">Comments</p>

                                <!-- Comment List -->
                                <div style="display:flex;flex-direction:column;gap:16px;margin-bottom:20px;">
                                    <template x-for="comment in getTopLevelComments(report.id)" :key="comment.id">
                                        <div style="padding:12px 14px;border-radius:10px;background:var(--surface);border:1px solid var(--border);">
                                            <div class="flex items-start gap-10">
                                                <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;"
                                                     x-text="(comment.user_name || comment.user_email || '?')[0].toUpperCase()"></div>
                                                <div style="flex:1;min-width:0;">
                                                    <div class="flex items-center gap-8" style="margin-bottom:4px;">
                                                        <span style="font-size:13px;font-weight:600;color:var(--text-primary);" x-text="comment.user_name || comment.user_email"></span>
                                                        <span class="text-muted" style="font-size:11px;" x-text="timeAgo(comment.created_at)"></span>
                                                    </div>
                                                    <p style="font-size:14px;color:var(--text-secondary);line-height:1.6;margin:0;" x-text="comment.content"></p>
                                                    <div class="flex items-center gap-12" style="margin-top:8px;">
                                                        <template x-if="canComment">
                                                            <button @click="setReply(report.id, comment)" style="border:none;background:none;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;padding:0;" onmouseover="this.style.color='var(--mint)'" onmouseout="this.style.color='var(--text-muted)'">Reply</button>
                                                        </template>
                                                        <template x-if="comment.user_id === _currentUserId">
                                                            <button @click="deleteComment(comment.id, report.id)" style="border:none;background:none;font-size:12px;color:var(--badge-red);cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;padding:0;">Delete</button>
                                                        </template>
                                                    </div>

                                                    <!-- Replies -->
                                                    <template x-for="reply in getReplies(report.id, comment.id)" :key="reply.id">
                                                        <div class="flex items-start gap-8" style="margin-top:12px;padding:10px 12px;border-radius:8px;background:var(--card);border-left:3px solid var(--mint);">
                                                            <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;"
                                                                 x-text="(reply.user_name || reply.user_email || '?')[0].toUpperCase()"></div>
                                                            <div style="flex:1;min-width:0;">
                                                                <div class="flex items-center gap-6" style="margin-bottom:2px;">
                                                                    <span style="font-size:12px;font-weight:600;color:var(--text-primary);" x-text="reply.user_name || reply.user_email"></span>
                                                                    <span class="text-muted" style="font-size:10px;" x-text="timeAgo(reply.created_at)"></span>
                                                                </div>
                                                                <p style="font-size:13px;color:var(--text-secondary);line-height:1.5;margin:0;" x-text="reply.content"></p>
                                                                <template x-if="reply.user_id === _currentUserId">
                                                                    <button @click="deleteComment(reply.id, report.id)" style="border:none;background:none;font-size:11px;color:var(--badge-red);cursor:pointer;font-family:'Inter',sans-serif;margin-top:4px;padding:0;">Delete</button>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                    <div x-show="getTopLevelComments(report.id).length === 0" class="text-muted" style="font-size:13px;text-align:center;padding:20px 0;">
                                        No comments yet. Be the first to comment.
                                    </div>
                                </div>

                                <!-- Comment Input -->
                                <template x-if="canComment">
                                    <div>
                                        <div x-show="replyTo[report.id]" class="flex items-center gap-6 mb-8" style="font-size:12px;color:var(--text-muted);">
                                            <span>Replying to comment</span>
                                            <button @click="cancelReply(report.id)" style="border:none;background:none;color:var(--badge-red);cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;font-weight:500;">Cancel</button>
                                        </div>
                                        <div class="flex items-center gap-8">
                                            <input :x-model="'commentInput[\'' + report.id + '\']'" x-model="commentInput[report.id]"
                                                   @keydown.enter="postComment(report.id)" type="text" class="input"
                                                   placeholder="Add a comment..." style="flex:1;font-size:13px;height:40px;border-radius:10px;">
                                            <button @click="postComment(report.id)" :disabled="!(commentInput[report.id] || '').trim()"
                                                    style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .15s;flex-shrink:0;"
                                                    :style="(commentInput[report.id] || '').trim() ? 'background:var(--mint);border-color:var(--mint);color:#fff;' : 'background:var(--surface);color:var(--text-muted);opacity:.5;cursor:not-allowed;'">
                                                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14m-7-7l7 7-7 7"/></svg>
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>

            </div>

            <!-- ═══ ARTIFACTS TAB ═══ -->
            <div x-show="activeTab === 'artifacts'" x-cloak>

                <!-- Empty State -->
                <template x-if="artifactCount === 0">
                    <div class="card empty-state">
                        <div class="empty-icon">
                            <svg width="28" height="28" fill="none" stroke="var(--deep-teal)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6z"/></svg>
                        </div>
                        <h3 class="text-primary mb-8" style="font-size:18px;font-weight:600;">No artifacts yet</h3>
                        <p class="text-secondary mb-24" style="font-size:14px;" x-text="canEdit ? 'Run the scout to generate downloadable reports, charts, and files.' : 'No artifacts have been generated yet.'"></p>
                        <template x-if="canEdit">
                            <button @click="runNow" :disabled="running" class="btn-primary">
                                <span x-text="running ? 'Running...' : 'Run Now'"></span>
                            </button>
                        </template>
                    </div>
                </template>

                <!-- Artifacts Content -->
                <template x-if="artifactCount > 0">
                    <div>
                        <!-- Type Filter Pills -->
                        <div class="flex flex-wrap items-center gap-8 mb-24">
                            <button @click="artifactFilter = 'all'" class="artifact-filter-pill"
                                    :class="artifactFilter === 'all' ? 'artifact-filter-active' : ''">
                                All <span style="margin-left:4px;opacity:.7;" x-text="getAllArtifacts().length"></span>
                            </button>
                            <template x-for="type in artifactTypes" :key="type">
                                <button @click="artifactFilter = type" class="artifact-filter-pill"
                                        :class="artifactFilter === type ? 'artifact-filter-active' : ''"
                                        :style="artifactFilter === type ? 'background:' + getArtifactTypeColor(type).text + ';color:#fff;border-color:' + getArtifactTypeColor(type).text : 'background:' + getArtifactTypeColor(type).bg + ';color:' + getArtifactTypeColor(type).text + ';border-color:' + getArtifactTypeColor(type).bg">
                                    <span x-text="getArtifactTypeLabel(type)"></span>
                                </button>
                            </template>
                        </div>

                        <!-- Artifacts Grid -->
                        <div class="artifacts-grid">
                            <template x-for="artifact in filteredArtifacts" :key="artifact.id">
                                <div class="artifact-card">
                                    <!-- Preview Area -->
                                    <div class="artifact-preview">
                                        <template x-if="artifact.isChart">
                                            <img :src="'data:image/png;base64,' + artifact.data" style="width:100%;height:100%;object-fit:cover;" />
                                        </template>
                                        <template x-if="artifact.type === 'html'">
                                            <div style="width:100%;height:100%;overflow:hidden;pointer-events:none;">
                                                <iframe :srcdoc="safeAtob(artifact.data)"
                                                        style="width:200%;height:200%;transform:scale(0.5);transform-origin:0 0;border:none;"
                                                        sandbox="allow-same-origin"></iframe>
                                            </div>
                                        </template>
                                        <template x-if="!artifact.isChart && artifact.type !== 'html'">
                                            <div class="flex flex-col items-center gap-8">
                                                <svg width="40" height="40" fill="none" stroke="var(--text-muted)" viewBox="0 0 24 24" style="opacity:.35;">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                                                </svg>
                                                <span class="mono-xs" style="letter-spacing:1px;" x-text="'.' + getExtForType(artifact.type)"></span>
                                            </div>
                                        </template>
                                        <span class="artifact-badge"
                                              :style="'background:' + getArtifactTypeColor(artifact.type).bg + ';color:' + getArtifactTypeColor(artifact.type).text"
                                              x-text="getArtifactTypeLabel(artifact.type)"></span>
                                    </div>

                                    <!-- Card Body -->
                                    <div class="artifact-body">
                                        <p class="text-primary text-truncate mb-4" style="font-size:14px;font-weight:600;" x-text="artifact.filename"></p>
                                        <p class="text-muted line-clamp-2 mb-12" style="font-size:12px;line-height:1.5;" x-text="artifact.description"></p>
                                        <div class="flex items-center justify-between mb-16">
                                            <span class="mono-xs" x-text="getArtifactTypeLabel(artifact.type) + ' \u00b7 ' + formatArtifactDate(artifact.createdAt)"></span>
                                            <span class="mono-xs" x-text="formatFileSize(artifact.sizeBytes)"></span>
                                        </div>
                                        <div class="flex gap-8">
                                            <button @click.stop="downloadArtifact(artifact)" class="export-btn flex-1" style="justify-content:center;height:34px;">
                                                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                                </svg>
                                                Download
                                            </button>
                                            <button @click.stop="previewArtifactAction(artifact)"
                                                    x-show="artifact.isChart || artifact.type === 'html' || artifact.type === 'pdf'"
                                                    class="icon-btn">
                                                <svg width="14" height="14" fill="none" stroke="var(--text-secondary)" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- Insights -->
                        <template x-if="selectedReport && isStructured && sd.insights && sd.insights.length > 0">
                            <div>
                                    <div class="card card-body mb-24">
                                        <p class="section-label">Key Insights</p>
                                        <div class="flex flex-col gap-12">
                                            <template x-for="(insight, ii) in sd.insights" :key="ii">
                                                <div class="flex items-start gap-12 text-secondary" style="font-size:14px;line-height:1.65;">
                                                    <span class="insight-number" x-text="ii + 1"></span>
                                                    <span x-text="insight"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- Sources -->
                                    <template x-if="citations.length > 0">
                                        <div class="card card-body">
                                            <p class="section-label">Sources</p>
                                            <div class="flex flex-col gap-8">
                                                <template x-for="(cite, ci) in citations" :key="ci">
                                                    <a :href="cite.url" target="_blank" rel="noopener" class="source-link">
                                                        <div class="source-number" x-text="ci + 1"></div>
                                                        <div class="min-w-0 flex-1">
                                                            <p class="text-primary text-truncate" style="font-size:13px;font-weight:500;" x-text="cite.title || cite.url"></p>
                                                            <p class="text-muted text-truncate" style="font-size:11px;" x-text="cite.url"></p>
                                                        </div>
                                                        <svg width="14" height="14" fill="none" stroke="var(--text-muted)" viewBox="0 0 24 24" class="shrink-0"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                                                    </a>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- ═══ DETAILS TAB ═══ -->
            <div x-show="activeTab === 'details'" x-cloak>
                <div class="card card-body-lg">
                    <div class="flex flex-col gap-24">
                        <!-- Name -->
                        <div>
                            <span class="section-label">Scout Name</span>
                            <p class="text-primary mt-4" style="font-size:16px;font-weight:600;" x-text="scout.name"></p>
                        </div>

                        <!-- Topic -->
                        <div>
                            <span class="section-label">Topic</span>
                            <p class="text-secondary mt-4" style="font-size:15px;" x-text="scout.topic"></p>
                        </div>

                        <!-- Keywords -->
                        <template x-if="scout.keywords">
                            <div>
                                <span class="section-label">Keywords</span>
                                <p class="text-secondary mt-4" style="font-size:14px;" x-text="scout.keywords"></p>
                            </div>
                        </template>

                        <!-- Description -->
                        <template x-if="scout.description">
                            <div>
                                <span class="section-label">Description</span>
                                <p class="text-secondary mt-4" style="font-size:14px;" x-text="scout.description"></p>
                            </div>
                        </template>

                        <!-- Source Filters -->
                        <template x-if="scout.include_sources || scout.exclude_sources">
                            <div>
                                <span class="section-label">Source Filters</span>
                                <div class="flex flex-wrap gap-6 mt-8">
                                    <template x-if="scout.include_sources">
                                        <template x-for="src in scout.include_sources.split('\n').filter(s => s.trim())" :key="'inc-'+src">
                                            <span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;background:rgba(16,185,129,.1);color:var(--badge-green);border:1px solid rgba(16,185,129,.2);">
                                                <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                                                <span x-text="src.trim()"></span>
                                            </span>
                                        </template>
                                    </template>
                                    <template x-if="scout.exclude_sources">
                                        <template x-for="src in scout.exclude_sources.split('\n').filter(s => s.trim())" :key="'exc-'+src">
                                            <span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;background:rgba(239,68,68,.1);color:var(--badge-red);border:1px solid rgba(239,68,68,.2);">
                                                <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg>
                                                <span x-text="src.trim()"></span>
                                            </span>
                                        </template>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- Grid: Schedule, Last Run, Next Run, Reports -->
                        <div class="detail-meta-grid">
                            <template x-if="scout.status !== 'once'">
                                <div>
                                    <span class="section-label">Schedule</span>
                                    <p class="text-secondary mt-4" style="font-weight:500;font-size:14px;" x-text="'Every ' + scout.schedule_minutes + ' min'"></p>
                                </div>
                            </template>
                            <template x-if="scout.status === 'once'">
                                <div>
                                    <span class="section-label">Type</span>
                                    <p class="text-secondary mt-4" style="font-weight:500;font-size:14px;">One-time</p>
                                </div>
                            </template>
                            <div>
                                <span class="section-label">Last Run</span>
                                <p class="text-secondary mt-4" style="font-weight:500;font-size:14px;" x-text="scout.last_run_at ? formatTime(scout.last_run_at) : 'Never'"></p>
                            </div>
                            <template x-if="scout.status !== 'once'">
                                <div>
                                    <span class="section-label">Next Run</span>
                                    <p class="text-secondary mt-4" style="font-weight:500;font-size:14px;" x-text="scout.next_run_at ? formatTime(scout.next_run_at) : '\u2014'"></p>
                                </div>
                            </template>
                            <div>
                                <span class="section-label">Total Reports</span>
                                <p class="text-secondary mt-4" style="font-weight:500;font-size:14px;" x-text="reports.length"></p>
                            </div>
                        </div>

                        <!-- Actions (hidden for viewers) -->
                        <template x-if="canEdit">
                            <div class="flex flex-wrap gap-10">
                                <button @click="runNow" :disabled="running" class="btn-primary btn-sm">
                                    <template x-if="running"><div class="spinner-sm"></div></template>
                                    <span x-text="running ? 'Running...' : 'Run Now'"></span>
                                </button>
                                <button @click="toggleStatus" class="btn-secondary btn-sm"
                                        x-text="scout.status === 'active' ? 'Pause Scout' : 'Resume Scout'"></button>
                                <button @click="deleteScout" class="btn-danger btn-sm">Delete Scout</button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

        </div>
    </template>

    <!-- ═══ PREVIEW MODAL ═══ -->
    <template x-if="showPreviewModal && previewArtifact">
        <div class="preview-backdrop" @click.self="closePreview()" @keydown.escape.window="closePreview()">
            <div class="preview-modal">
                <!-- Modal Header -->
                <div class="preview-header">
                    <div class="flex items-center gap-12 min-w-0">
                        <span class="artifact-badge"
                              :style="'background:' + getArtifactTypeColor(previewArtifact.type).bg + ';color:' + getArtifactTypeColor(previewArtifact.type).text"
                              x-text="getArtifactTypeLabel(previewArtifact.type)"></span>
                        <span class="text-primary text-truncate" style="font-size:14px;font-weight:600;" x-text="previewArtifact.filename"></span>
                    </div>
                    <div class="flex items-center gap-8 shrink-0">
                        <button @click="downloadArtifact(previewArtifact)" class="export-btn" style="height:32px;">
                            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3"/>
                            </svg>
                            Download
                        </button>
                        <button @click="closePreview()" class="icon-btn" style="width:32px;height:32px;">
                            <svg width="16" height="16" fill="none" stroke="var(--text-secondary)" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>

                    </div>
                </div>

                <div style="flex:1;overflow:auto;">

                        <div class="flex items-center justify-center" style="padding:24px;background:var(--surface);min-height:300px;">
                            <img :src="'data:image/png;base64,' + previewArtifact.data" style="max-width:100%;max-height:70vh;border-radius:8px;" />
                        </div>
                    </template>
                    <template x-if="previewArtifact.type === 'html'">
                        <iframe :srcdoc="safeAtob(previewArtifact.data)" style="width:100%;height:70vh;border:none;" sandbox="allow-same-origin allow-scripts"></iframe>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══ FLOATING FOLLOW-UP CHAT ═══ -->
    <template x-if="reports.length > 0 && !loading">
        <div class="fab-wrap">
            <!-- Chat Panel -->
            <div x-show="showFollowUpChat" x-cloak class="fab-panel" @click.stop>
                <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
                    <span style="font-size:14px;font-weight:600;color:var(--text-primary);">Follow-up Questions</span>
                    <button @click="showFollowUpChat = false" style="border:none;background:none;cursor:pointer;color:var(--text-muted);font-size:20px;line-height:1;padding:0 4px;font-family:'Inter',sans-serif;">&#215;</button>
                </div>
                <div style="flex:1;overflow-y:auto;padding:16px 18px;" x-ref="chatScroll">
                    <template x-if="chatMessages.length === 0 && !chatLoading">
                        <p class="text-muted" style="font-size:13px;text-align:center;padding:32px 0;line-height:1.6;">
                            Ask any question about the current report.
                        </p>
                    </template>
                    <template x-for="(msg, mi) in chatMessages" :key="mi">
                        <div :style="msg.role === 'user' ? 'text-align:right;margin-bottom:12px;' : 'margin-bottom:12px;'">
                            <div :style="msg.role === 'user'
                                ? 'display:inline-block;max-width:85%;padding:10px 14px;border-radius:14px 14px 4px 14px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.2);font-size:13px;color:var(--text-primary);text-align:left;'
                                : 'max-width:90%;padding:10px 14px;border-radius:14px 14px 14px 4px;background:var(--surface);border:1px solid var(--border);font-size:13px;color:var(--text-secondary);line-height:1.7;'"
                                x-html="msg.role === 'assistant' ? formatMarkdown(msg.content) : msg.content">
                            </div>
                        </div>
                    </template>
                    <template x-if="chatLoading">
                        <div style="margin-bottom:12px;">
                            <div style="display:inline-flex;gap:6px;padding:10px 16px;border-radius:14px;background:var(--surface);border:1px solid var(--border);">
                                <div class="spinner-sm" style="width:14px;height:14px;color:var(--deep-teal);"></div>
                                <span class="text-muted" style="font-size:12px;">Thinking...</span>
                            </div>
                        </div>
                    </template>
                </div>
                <div class="gpt-composer-wrap">
                    <div class="gpt-composer" :class="chatInputFocused ? 'gpt-composer-focus' : ''">
                        <textarea x-model="chatInput"
                                  @keydown.enter.prevent="if(!$event.shiftKey){ askFollowUp() } else { chatInput += '\n' }"
                                  @focus="chatInputFocused = true"
                                  @blur="chatInputFocused = false"
                                  @input="$event.target.style.height='auto'; $event.target.style.height=Math.min($event.target.scrollHeight,160)+'px'"
                                  rows="1"
                                  placeholder="Message Scouts…"
                                  class="gpt-textarea"
                                  :disabled="chatLoading"></textarea>
                        <button @click="askFollowUp()" :disabled="!chatInput.trim() || chatLoading"
                                class="gpt-send"
                                :class="chatInput.trim() && !chatLoading ? 'gpt-send-active' : ''">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19V5m0 0l-6 6m6-6l6 6"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Pill trigger (collapsed) -->
            <button x-show="!showFollowUpChat" @click="showFollowUpChat = true" class="fab-pill"
                    title="Ask a follow-up question">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                <span>Ask a follow-up…</span>
            </button>
            <!-- Close button (when panel open) -->
            <button x-show="showFollowUpChat" x-cloak @click="showFollowUpChat = false" class="fab-pill-close"
                    title="Close chat">
                <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
    </template>

    <!-- ═══ PIN TO COLLECTION MODAL ═══ -->
    <template x-if="showPinModal">
        <div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;"
             @click.self="showPinModal = null" @keydown.escape.window="showPinModal = null">

                </div>
                <div class="flex flex-col gap-8" style="max-height:240px;overflow-y:auto;">
                    <template x-for="col in pinCollections" :key="col.id">
